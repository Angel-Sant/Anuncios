name: Notificaciones Comunica

# Se ejecuta solo cada 10 minutos (y también se puede correr a mano desde la pestaña Actions).
on:
  schedule:
    - cron: '*/10 * * * *'
  workflow_dispatch:

permissions:
  contents: write   # para el "latido" que mantiene vivo el flujo

jobs:
  enviar:
    runs-on: ubuntu-latest
    steps:
      - name: Descargar el repositorio
        uses: actions/checkout@v4

      - name: Preparar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Instalar dependencias
        working-directory: notificador
        run: npm install

      - name: Enviar notificaciones pendientes
        working-directory: notificador
        env:
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
          ONESIGNAL_APP_ID: ${{ secrets.ONESIGNAL_APP_ID }}
          ONESIGNAL_REST_API_KEY: ${{ secrets.ONESIGNAL_REST_API_KEY }}
        run: node enviar.js

      # Latido: un commit al día para que GitHub no desactive el flujo por inactividad (60 días).
      - name: Mantener vivo el flujo
        run: |
          mkdir -p notificador
          echo "Última actividad: $(date -u +%F)" > notificador/latido.txt
          if [ -n "$(git status --porcelain notificador/latido.txt)" ]; then
            git config user.name "comunica-bot"
            git config user.email "comunica-bot@users.noreply.github.com"
            git add notificador/latido.txt
            git commit -m "latido diario (mantener activo el robot)"
            git push
          else
            echo "Sin cambios en el latido hoy."
          fi
