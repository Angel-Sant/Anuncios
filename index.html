<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Comunica · Colegio Bilbao</title>
<meta name="theme-color" content="#4A8BC4">
<link rel="manifest" href="./manifest.webmanifest">
<link rel="apple-touch-icon" href="./icon-192.png">
<link rel="icon" type="image/png" href="./icon-192.png">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="Comunica">
<script src="https://cdn.onesignal.com/sdks/web/v16/OneSignalSDK.page.js" defer></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600;9..144,700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
/* ===================== TOKENS ===================== */
:root{
  --bg:#EBEEEC;
  --surface:#FFFFFF;
  --surface-2:#F4F6F4;
  --ink:#1B2521;
  --ink-soft:#566159;
  --ink-faint:#8A938C;
  --line:#DDE2DE;
  --line-soft:#E9ECE9;
  --pine:#4A8BC4;
  --pine-dark:#3570A2;
  --pine-tint:#E5EFF8;
  --gold:#C2922F;
  --gold-tint:#F4ECD8;
  /* prioridades (codifican significado) */
  --urgente:#C0392B;
  --urgente-tint:#FBEAE7;
  --importante:#CC7A14;
  --importante-tint:#FBF0DE;
  --info:#2C7A7B;
  --info-tint:#E2F0F0;
  --radius:14px;
  --radius-sm:10px;
  --shadow:0 1px 2px rgba(27,37,33,.05), 0 8px 24px -12px rgba(27,37,33,.18);
  --shadow-lg:0 24px 60px -20px rgba(27,37,33,.35);
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%}
body{
  font-family:'Inter',system-ui,sans-serif;
  background:var(--bg);
  color:var(--ink);
  -webkit-font-smoothing:antialiased;
  line-height:1.45;
}
button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit}
input,textarea,select{font-family:inherit;font-size:15px;color:var(--ink)}
@media (prefers-reduced-motion:reduce){*{animation:none!important;transition:none!important}}

/* ===================== LOGIN ===================== */
.login{min-height:100vh;display:grid;place-items:center;padding:24px;
  background:
    radial-gradient(1200px 600px at 70% -10%, rgba(74,139,196,.10), transparent 60%),
    radial-gradient(900px 500px at -10% 110%, rgba(194,146,47,.10), transparent 55%),
    var(--bg);}
.login-card{width:100%;max-width:420px;background:var(--surface);border:1px solid var(--line);
  border-radius:20px;box-shadow:var(--shadow-lg);padding:40px 34px;text-align:center}
.brand{display:flex;align-items:center;justify-content:center;gap:11px;margin-bottom:26px}
.brand-mark{width:40px;height:40px;border-radius:12px;background:var(--pine);display:grid;place-items:center;
  color:#fff;flex:none;box-shadow:0 6px 16px -6px rgba(74,139,196,.6)}
.brand-mark svg{width:22px;height:22px}
.brand-name{font-family:'Fraunces',serif;font-weight:600;font-size:23px;letter-spacing:-.01em;line-height:1}
.brand-name span{color:var(--pine)}
.login-card h1{font-family:'Fraunces',serif;font-weight:600;font-size:25px;letter-spacing:-.02em;margin-bottom:8px;line-height:1.2}
.login-card p.sub{color:var(--ink-soft);font-size:14.5px;margin-bottom:26px}
.gbtn{width:100%;display:flex;align-items:center;justify-content:center;gap:11px;background:var(--surface);
  border:1px solid var(--line);border-radius:11px;padding:13px;font-weight:600;font-size:15px;color:var(--ink);
  transition:border-color .15s, box-shadow .15s, transform .05s}
.gbtn:hover{border-color:#c4ccc6;box-shadow:var(--shadow)}
.gbtn:active{transform:translateY(1px)}
.gbtn svg{width:19px;height:19px;flex:none}
.domain-note{margin-top:14px;font-size:12.5px;color:var(--ink-faint);display:flex;align-items:center;gap:6px;justify-content:center}
.demo-divider{display:flex;align-items:center;gap:12px;margin:26px 0 18px;color:var(--ink-faint);font-size:12px;
  text-transform:uppercase;letter-spacing:.08em}
.demo-divider::before,.demo-divider::after{content:"";height:1px;flex:1;background:var(--line)}
.demo-users{display:grid;gap:8px;max-height:280px;overflow-y:auto;padding-right:2px}
.demo-user{display:flex;align-items:center;gap:12px;text-align:left;border:1px solid var(--line);border-radius:11px;
  padding:10px 12px;transition:border-color .15s,background .15s}
.demo-user:hover{border-color:var(--pine);background:var(--pine-tint)}
.avatar{width:36px;height:36px;border-radius:50%;flex:none;display:grid;place-items:center;color:#fff;
  font-weight:600;font-size:13px}
.demo-user .du-meta{min-width:0}
.demo-user .du-name{font-weight:600;font-size:14px;line-height:1.2}
.demo-user .du-role{font-size:12.5px;color:var(--ink-soft)}

/* ===================== APP SHELL ===================== */
.app{display:none;min-height:100vh}
.app.active{display:grid;grid-template-columns:248px 1fr}
.sidebar{background:var(--pine);color:#E8F0EE;padding:22px 16px;display:flex;flex-direction:column;gap:6px;
  position:sticky;top:0;height:100vh}
.sidebar .brand{justify-content:flex-start;margin-bottom:24px;padding:0 6px}
.sidebar .brand-mark{background:rgba(255,255,255,.14);box-shadow:none}
.sidebar .brand-name{color:#fff}
.sidebar .brand-name span{color:var(--gold)}
.nav-item{display:flex;align-items:center;gap:12px;padding:11px 13px;border-radius:10px;color:#C5D6D1;
  font-weight:500;font-size:14.5px;transition:background .15s,color .15s;width:100%;text-align:left}
.nav-item svg{width:19px;height:19px;flex:none;opacity:.9}
.nav-item:hover{background:rgba(255,255,255,.08);color:#fff}
.nav-item.active{background:rgba(255,255,255,.16);color:#fff}
.nav-item .badge{margin-left:auto;background:var(--urgente);color:#fff;font-size:11px;font-weight:700;
  min-width:19px;height:19px;border-radius:10px;display:grid;place-items:center;padding:0 5px}
.sidebar-foot{margin-top:auto;border-top:1px solid rgba(255,255,255,.14);padding-top:14px}
.me{display:flex;align-items:center;gap:11px;padding:4px 6px}
.me .du-name{font-weight:600;font-size:13.5px;color:#fff;line-height:1.2}
.me .du-role{font-size:12px;color:#A9C2BB}
.signout{margin-top:8px;width:100%;text-align:left;padding:8px 13px;border-radius:9px;color:#A9C2BB;
  font-size:13px;transition:background .15s,color .15s}
.signout:hover{background:rgba(255,255,255,.08);color:#fff}

.main{min-width:0}
.topbar{position:sticky;top:0;z-index:20;background:rgba(235,238,236,.85);backdrop-filter:blur(10px);
  border-bottom:1px solid var(--line);padding:16px 30px;display:flex;align-items:center;gap:16px}
.topbar h2{font-family:'Fraunces',serif;font-weight:600;font-size:24px;letter-spacing:-.02em;flex:1;min-width:0}
.bar-bell{position:relative;background:none;border:none;cursor:pointer;color:#5a6b64;padding:8px;border-radius:10px;display:flex;align-items:center;flex:none}
.bar-bell:hover{background:rgba(0,0,0,.06)}
.bar-bell svg{width:22px;height:22px}
.bar-bell.on{color:#1D9E75}
.bell-dot{position:absolute;top:4px;right:4px;width:9px;height:9px;border-radius:50%;background:#BA7517;border:2px solid #EBEEEC}
.bar-bell.on .bell-dot{display:none}
.topbar .eyebrow{display:block;font-family:'Inter';font-size:11.5px;font-weight:600;text-transform:uppercase;
  letter-spacing:.1em;color:var(--pine);margin-bottom:1px}
.btn-primary{background:var(--pine);color:#fff;font-weight:600;font-size:14px;padding:10px 16px;border-radius:10px;
  display:inline-flex;align-items:center;gap:7px;transition:background .15s,transform .05s;white-space:nowrap}
.btn-primary:hover{background:var(--pine-dark)}
.btn-primary:active{transform:translateY(1px)}
.btn-primary svg{width:16px;height:16px}
.btn-primary:disabled{opacity:.4;cursor:not-allowed}
.content{padding:24px 30px 80px;max-width:920px}

/* filtros */
.filters{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:20px;align-items:center}
.chip{border:1px solid var(--line);background:var(--surface);border-radius:999px;padding:7px 14px;font-size:13.5px;
  font-weight:500;color:var(--ink-soft);transition:all .15s;display:inline-flex;align-items:center;gap:7px}
.chip:hover{border-color:#c4ccc6}
.chip.active{background:var(--ink);border-color:var(--ink);color:#fff}
.chip .dot{width:8px;height:8px;border-radius:50%}
.chip.active .dot{box-shadow:0 0 0 2px rgba(255,255,255,.4)}
.seg-select{margin-left:auto;border:1px solid var(--line);background:var(--surface);border-radius:10px;
  padding:8px 12px;font-size:13.5px;font-weight:500;color:var(--ink-soft)}

/* avisos */
.aviso{position:relative;background:var(--surface);border:1px solid var(--line);border-radius:var(--radius);
  padding:20px 22px 18px 26px;margin-bottom:14px;box-shadow:var(--shadow);overflow:hidden}
.aviso .rail{position:absolute;left:0;top:0;bottom:0;width:5px}
.aviso-head{display:flex;align-items:flex-start;gap:12px;margin-bottom:10px}
.prio-tag{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.07em;padding:4px 9px;
  border-radius:6px;white-space:nowrap}
.aviso-head .aviso-title{font-family:'Fraunces',serif;font-weight:600;font-size:19px;letter-spacing:-.01em;
  line-height:1.25;flex:1;min-width:0}
.aviso-body{color:var(--ink-soft);font-size:14.5px;margin-bottom:16px;white-space:pre-wrap}
.aviso-meta{display:flex;align-items:center;gap:10px;flex-wrap:wrap;font-size:12.5px;color:var(--ink-faint)}
.aud-tag{background:var(--surface-2);border:1px solid var(--line-soft);border-radius:6px;padding:3px 9px;
  font-weight:600;color:var(--ink-soft);font-size:11.5px}
.aviso-foot{margin-top:16px;padding-top:15px;border-top:1px solid var(--line-soft);display:flex;align-items:center;
  gap:14px;flex-wrap:wrap}
.readbar{flex:1;min-width:160px}
.readbar-top{display:flex;justify-content:space-between;font-size:12px;font-weight:600;color:var(--ink-soft);margin-bottom:5px}
.readbar-track{height:6px;background:var(--line-soft);border-radius:999px;overflow:hidden}
.readbar-fill{height:100%;background:var(--pine);border-radius:999px;transition:width .4s ease}
.btn-confirm{border:1px solid var(--pine);color:var(--pine);font-weight:600;font-size:13px;padding:8px 15px;
  border-radius:9px;transition:all .15s;display:inline-flex;align-items:center;gap:6px;white-space:nowrap}
.btn-confirm:hover{background:var(--pine-tint)}
.btn-confirm.done{background:var(--pine);color:#fff;border-color:var(--pine);cursor:default}
.btn-confirm svg{width:15px;height:15px}
.pending-link{font-size:12.5px;color:var(--ink-faint);text-decoration:underline;text-underline-offset:2px}

/* calendario */
.cal-head{display:flex;align-items:center;gap:14px;margin-bottom:18px}
.cal-head h3{font-family:'Fraunces',serif;font-size:20px;font-weight:600;min-width:190px;text-align:center}
.cal-nav{width:34px;height:34px;border-radius:9px;border:1px solid var(--line);background:var(--surface);
  display:grid;place-items:center;transition:border-color .15s}
.cal-nav:hover{border-color:var(--pine)}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:6px;background:var(--surface);border:1px solid var(--line);
  border-radius:var(--radius);padding:12px;box-shadow:var(--shadow)}
.cal-dow{text-align:center;font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.06em;
  color:var(--ink-faint);padding:4px 0}
.cal-day{min-height:74px;border-radius:9px;padding:6px;border:1px solid transparent;transition:background .12s}
.cal-day.in:hover{background:var(--surface-2)}
.cal-day.out{opacity:.35}
.cal-day.today{background:var(--pine-tint);border-color:var(--pine)}
.cal-day .dnum{font-size:12.5px;font-weight:600;color:var(--ink-soft)}
.cal-day.today .dnum{color:var(--pine)}
.cal-ev{font-size:11px;font-weight:600;color:#fff;border-radius:5px;padding:2px 5px;margin-top:3px;cursor:pointer;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.cal-ev:hover{filter:brightness(1.08)}
.ev-cat{display:inline-block;color:#fff;font-size:11px;font-weight:700;letter-spacing:.4px;text-transform:uppercase;padding:3px 9px;border-radius:20px}
.ev-aud{font-size:13px;color:var(--ink-soft);margin:6px 0}
.ev-body{margin:12px 0;line-height:1.5;white-space:pre-wrap}
.ev-rem-title{font-size:12px;font-weight:700;color:var(--ink-soft);text-transform:uppercase;letter-spacing:.4px;margin:14px 0 6px}
.ev-rem{display:flex;flex-wrap:wrap;gap:6px}
.ev-rem span{background:var(--surface-2);border:1px solid var(--line);border-radius:20px;padding:4px 10px;font-size:13px}
.ev-file{display:inline-flex;align-items:center;gap:8px;background:var(--surface-2);border:1px solid var(--line);border-radius:10px;padding:8px 12px;font-size:14px;font-weight:600;color:var(--pine);text-decoration:none}
.ev-file svg{width:16px;height:16px}
.ev-file.no-dl{color:var(--ink-soft);font-weight:500}
.ev-note{color:var(--ink-faint);font-weight:400;font-size:12px}

/* documentos / directorio */
.doc{display:flex;align-items:center;gap:14px;background:var(--surface);border:1px solid var(--line);
  border-radius:var(--radius-sm);padding:14px 16px;margin-bottom:10px;box-shadow:var(--shadow)}
.doc .ic{width:38px;height:38px;border-radius:9px;background:var(--gold-tint);color:var(--gold);display:grid;
  place-items:center;flex:none}
.doc .ic svg{width:19px;height:19px}
.doc .d-name{font-weight:600;font-size:14.5px}
.doc .d-cat{font-size:12.5px;color:var(--ink-faint)}
.doc a{margin-left:auto;color:var(--pine);font-weight:600;font-size:13.5px;text-decoration:none;display:inline-flex;
  align-items:center;gap:5px}
.doc a:hover{text-decoration:underline}
.dir-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(240px,1fr));gap:12px}
.dir-card{background:var(--surface);border:1px solid var(--line);border-radius:var(--radius-sm);padding:16px;
  box-shadow:var(--shadow);display:flex;align-items:center;gap:13px}
.dir-card .d-name{font-weight:600;font-size:14.5px;line-height:1.2}
.dir-card .d-role{font-size:12.5px;color:var(--ink-soft)}
.dir-card .d-area{font-size:11.5px;color:var(--ink-faint);margin-top:1px}

.area-label{font-size:12px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:var(--ink-faint);
  margin:22px 0 10px}
.sub-label{font-size:12.5px;font-weight:600;color:var(--pine);margin:14px 0 8px;padding-left:2px;
  display:flex;align-items:center;gap:7px}
.sub-label::before{content:"";width:14px;height:2px;background:var(--pine);border-radius:2px;opacity:.6}
/* ===== HORARIOS Y SUPLENCIAS ===== */
.tabs{display:flex;gap:4px;background:var(--surface-2);border:1px solid var(--line);border-radius:11px;
  padding:4px;margin-bottom:20px;width:fit-content}
.tab{padding:8px 16px;border-radius:8px;font-weight:600;font-size:13.5px;color:var(--ink-soft);transition:all .15s}
.tab.active{background:var(--surface);color:var(--pine);box-shadow:var(--shadow)}
.row-ctrl{display:flex;flex-wrap:wrap;gap:10px;align-items:flex-end;margin-bottom:18px}
.row-ctrl .ctrl{display:flex;flex-direction:column;gap:5px}
.row-ctrl label{font-size:12px;font-weight:600;color:var(--ink-soft)}
.row-ctrl select{border:1px solid var(--line);background:var(--surface);border-radius:10px;padding:9px 12px;font-size:14px;min-width:160px}
.mini-btn{border:1px solid var(--line);background:var(--surface);border-radius:10px;padding:9px 14px;font-weight:600;
  font-size:13.5px;color:var(--ink-soft);transition:all .15s;display:inline-flex;align-items:center;gap:7px}
.mini-btn:hover{border-color:var(--pine);color:var(--pine)}
.mini-btn svg{width:15px;height:15px}

.sg-wrap{overflow-x:auto;border:1px solid var(--line);border-radius:var(--radius);background:var(--surface);box-shadow:var(--shadow)}
table.sg{border-collapse:collapse;width:100%;min-width:560px}
table.sg th,table.sg td{border:1px solid var(--line-soft);padding:0;text-align:center}
table.sg thead th{background:var(--surface-2);font-size:12px;font-weight:700;color:var(--ink-soft);padding:9px 6px}
table.sg .ph{background:var(--surface-2);font-size:11.5px;font-weight:700;color:var(--ink-soft);width:64px;padding:8px 4px;white-space:nowrap}
table.sg .ph small{display:block;font-weight:500;color:var(--ink-faint);font-size:10px}
.sg-cell{min-height:46px;height:46px;font-size:12.5px;font-weight:600;cursor:pointer;transition:background .12s;
  display:flex;align-items:center;justify-content:center;color:var(--ink);width:100%;padding:4px}
.sg-cell.busy{background:var(--pine-tint);color:var(--pine-dark)}
.sg-cell.free{background:repeating-linear-gradient(45deg,transparent,transparent 5px,var(--surface-2) 5px,var(--surface-2) 10px);color:var(--ink-faint)}
.sg-cell:hover{outline:2px solid var(--pine);outline-offset:-2px}
.sg-legend{display:flex;gap:16px;margin-top:12px;font-size:12.5px;color:var(--ink-soft)}
.sg-legend span{display:inline-flex;align-items:center;gap:7px}
.lg-sq{width:14px;height:14px;border-radius:4px}

/* suplencias */
.absence-card{background:var(--surface);border:1px solid var(--line);border-radius:var(--radius);padding:18px 20px;
  margin-bottom:14px;box-shadow:var(--shadow)}
.absence-head{display:flex;align-items:center;gap:11px;margin-bottom:14px;flex-wrap:wrap}
.absence-head .ah-name{font-family:'Fraunces',serif;font-size:18px;font-weight:600}
.absence-head .ah-tag{background:var(--urgente-tint);color:var(--urgente);font-size:11.5px;font-weight:700;
  padding:3px 9px;border-radius:6px;text-transform:uppercase;letter-spacing:.05em}
.absence-head .ah-tag.meet{background:var(--importante-tint);color:var(--importante)}
.absence-head .ah-sec{font-size:12.5px;color:var(--ink-faint)}
.absence-head .ah-rm{margin-left:auto;color:var(--ink-faint);font-size:13px}
.absence-head .ah-rm:hover{color:var(--urgente)}
.asgn{display:flex;align-items:center;gap:12px;padding:10px 0;border-top:1px solid var(--line-soft)}
.asgn .as-per{font-size:12px;font-weight:700;color:var(--ink-soft);width:96px;flex:none}
.asgn .as-per small{display:block;font-weight:500;color:var(--ink-faint)}
.asgn .as-grp{font-size:13px;color:var(--ink-soft);width:64px;flex:none}
.asgn .as-arrow{color:var(--ink-faint);flex:none}.asgn .as-arrow svg{width:16px;height:16px;display:block}
.asgn select{flex:1;border:1px solid var(--line);border-radius:9px;padding:8px 10px;font-size:13.5px;font-weight:600;min-width:0}
.asgn.nocover select{border-color:var(--urgente);color:var(--urgente)}
.asgn .as-sub{flex:1;font-size:13.5px;font-weight:600}
.nocover-txt{color:var(--urgente);font-weight:700;font-size:13px}

.fair-card{background:var(--surface);border:1px solid var(--line);border-radius:var(--radius);padding:18px 20px;
  box-shadow:var(--shadow);margin-top:8px}
.fair-card h4{font-family:'Fraunces',serif;font-size:16px;font-weight:600;margin-bottom:4px}
.fair-card .fc-sub{font-size:12.5px;color:var(--ink-faint);margin-bottom:16px}
.cover-row{display:flex;align-items:center;gap:12px;margin-bottom:9px}
.cover-row .cr-name{width:130px;flex:none;font-size:13px;font-weight:600;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.cover-row .cr-track{flex:1;height:22px;background:var(--surface-2);border-radius:7px;overflow:hidden;position:relative}
.cover-row .cr-fill{height:100%;background:linear-gradient(90deg,var(--pine),#6BA6D6);border-radius:7px;transition:width .4s;min-width:2px}
.cover-row .cr-n{width:64px;flex:none;text-align:right;font-size:12.5px;font-weight:700;color:var(--ink-soft)}
.fair-foot{margin-top:14px;font-size:12.5px;color:var(--ink-faint);display:flex;align-items:center;gap:7px}

.empty{text-align:center;padding:50px 20px;color:var(--ink-faint)}
.empty svg{width:40px;height:40px;opacity:.4;margin-bottom:10px}

/* ===================== MODAL ===================== */
.modal-bg{position:fixed;inset:0;background:rgba(20,28,24,.45);backdrop-filter:blur(3px);z-index:100;
  display:none;align-items:flex-start;justify-content:center;padding:40px 20px;overflow-y:auto}
.modal-bg.active{display:flex}
.modal{width:100%;max-width:540px;background:var(--surface);border-radius:18px;box-shadow:var(--shadow-lg);
  padding:26px 28px 24px;animation:pop .18s ease}
@keyframes pop{from{transform:translateY(8px) scale(.98);opacity:0}to{transform:none;opacity:1}}
.modal h3{font-family:'Fraunces',serif;font-size:21px;font-weight:600;margin-bottom:4px}
.modal .m-sub{color:var(--ink-soft);font-size:13.5px;margin-bottom:20px}
.field{margin-bottom:16px}
.field label{display:block;font-size:13px;font-weight:600;margin-bottom:6px;color:var(--ink)}
.field input,.field textarea,.field select{width:100%;border:1px solid var(--line);border-radius:10px;padding:11px 13px;
  background:var(--surface);transition:border-color .15s}
.field input:focus,.field textarea:focus,.field select:focus{outline:none;border-color:var(--pine);
  box-shadow:0 0 0 3px var(--pine-tint)}
.field textarea{resize:vertical;min-height:90px}
.prio-pick{display:grid;grid-template-columns:repeat(3,1fr);gap:8px}
.prio-opt{border:1.5px solid var(--line);border-radius:10px;padding:10px;text-align:center;font-weight:600;
  font-size:13px;transition:all .12s}
.prio-opt:hover{border-color:#c4ccc6}
.prio-opt.sel{color:#fff}
.prio-opt .po-dot{width:9px;height:9px;border-radius:50%;display:inline-block;margin-right:6px;vertical-align:middle}
.modal-actions{display:flex;gap:10px;justify-content:flex-end;margin-top:22px}
.opt{color:var(--ink-faint);font-weight:400}
.attach-btn{display:inline-flex;align-items:center;gap:8px;border:1px dashed var(--line);border-radius:10px;
  padding:10px 14px;font-weight:600;font-size:13.5px;color:var(--ink-soft);transition:all .15s;width:100%;justify-content:center}
.attach-btn:hover{border-color:var(--pine);color:var(--pine);background:var(--pine-tint)}
.attach-btn svg{width:16px;height:16px}
.file-chip{display:flex;align-items:center;gap:10px;background:var(--gold-tint);border:1px solid #ecdcb6;
  border-radius:10px;padding:9px 12px;margin-top:9px;font-size:13.5px}
.file-chip .fc-ic{color:var(--gold);flex:none}.file-chip .fc-ic svg{width:17px;height:17px;display:block}
.file-chip .fc-name{flex:1;font-weight:600;color:var(--ink);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.file-chip .fc-x{flex:none;color:var(--ink-faint);font-weight:700;font-size:16px;line-height:1;padding:2px 4px;border-radius:6px}
.file-chip .fc-x:hover{background:rgba(0,0,0,.06);color:var(--ink)}
.sched-toggle{display:flex;align-items:center;gap:13px;width:100%;text-align:left;border:1px solid var(--line);
  border-radius:11px;padding:12px 14px;transition:border-color .15s;font-size:14px;color:var(--ink)}
.sched-toggle:hover{border-color:#c4ccc6}
.sched-toggle.on{border-color:var(--pine);background:var(--pine-tint)}
.sched-hint{font-size:12.5px;color:var(--ink-faint);font-weight:400}
.switch{width:40px;height:23px;border-radius:999px;background:var(--line);flex:none;position:relative;transition:background .18s}
.switch .knob{position:absolute;top:2px;left:2px;width:19px;height:19px;border-radius:50%;background:#fff;
  box-shadow:0 1px 3px rgba(0,0,0,.25);transition:transform .18s}
.sched-toggle.on .switch{background:var(--pine)}
.sched-toggle.on .switch .knob{transform:translateX(17px)}
.sched-fields{max-height:0;overflow:hidden;opacity:0;transition:max-height .25s ease, opacity .2s, margin .2s;margin-top:0}
.sched-fields.open{max-height:420px;opacity:1;margin-top:14px}
.sched-row{display:flex;gap:12px}
.sched-fields label{display:block;font-size:13px;font-weight:600;margin-bottom:6px;color:var(--ink)}
.sched-fields input,.sched-fields select{width:100%;border:1px solid var(--line);border-radius:10px;padding:10px 12px}
.rem-pick{display:flex;flex-wrap:wrap;gap:7px}
.rem-opt{border:1px solid var(--line);border-radius:999px;padding:7px 13px;font-size:13px;font-weight:600;
  color:var(--ink-soft);transition:all .12s}
.rem-opt:hover{border-color:#c4ccc6}
.rem-opt.sel{background:var(--pine);border-color:var(--pine);color:#fff}
/* tira de actividad dentro del aviso */
.act-strip{display:flex;flex-wrap:wrap;gap:8px;margin-top:14px}
.act-chip{display:inline-flex;align-items:center;gap:7px;border-radius:9px;padding:8px 12px;font-size:13px;font-weight:600}
.act-chip svg{width:15px;height:15px;flex:none}
.act-chip.cal{background:var(--pine-tint);color:var(--pine-dark)}
.act-chip.doc{background:var(--gold-tint);color:#8a6a1e;cursor:pointer;border:none}
.act-chip.doc:hover{filter:brightness(.97)}
.act-chip.rem{background:var(--surface-2);color:var(--ink-soft);border:1px solid var(--line-soft)}
.btn-ghost{padding:10px 16px;border-radius:10px;font-weight:600;font-size:14px;color:var(--ink-soft);
  border:1px solid var(--line);transition:background .15s}
.btn-ghost:hover{background:var(--surface-2)}

/* toast */
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(20px);background:var(--ink);
  color:#fff;padding:12px 20px;border-radius:11px;font-size:14px;font-weight:500;box-shadow:var(--shadow-lg);
  opacity:0;pointer-events:none;transition:all .25s;z-index:200;display:flex;align-items:center;gap:9px}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
.toast svg{width:17px;height:17px;color:var(--gold)}

/* mobile bottom nav */
.mobile-nav{display:none}
.notif-banner{display:flex;align-items:center;gap:10px;margin:14px 20px 0;padding:12px 14px;background:var(--pine-tint);
  border:1px solid var(--pine);border-radius:var(--radius-sm);color:var(--pine)}
.notif-banner svg{width:20px;height:20px;flex:none}
.notif-banner .nb-text{flex:1;font-size:13.5px;font-weight:600;line-height:1.35}
.notif-banner .nb-btn{flex:none;background:var(--pine);color:#fff;border:none;border-radius:8px;padding:8px 16px;
  font-size:13.5px;font-weight:700;cursor:pointer}
.notif-banner .nb-btn:hover{filter:brightness(1.08)}
@media(max-width:640px){.notif-banner{margin:12px 14px 0}}
@media (max-width:860px){
  .app.active{grid-template-columns:1fr}
  .sidebar{display:none}
  .content{padding:18px 16px 96px}
  .topbar{padding:14px 16px}
  .topbar h2{font-size:21px}
  .seg-select{margin-left:0;width:100%}
  .filters{gap:7px}
  .mobile-nav{display:flex;position:fixed;bottom:0;left:0;right:0;z-index:50;background:var(--surface);
    border-top:1px solid var(--line);padding:8px 6px calc(8px + env(safe-area-inset-bottom));justify-content:space-around}
  .mnav-item{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;padding:6px 4px;border-radius:9px;
    color:var(--ink-faint);font-size:10.5px;font-weight:600;position:relative}
  .mnav-item svg{width:21px;height:21px}
  .mnav-item.active{color:var(--pine)}
  .mnav-item .mbadge{position:absolute;top:2px;right:50%;margin-right:-18px;background:var(--urgente);color:#fff;
    font-size:9px;font-weight:700;min-width:15px;height:15px;border-radius:8px;display:grid;place-items:center;padding:0 3px}
  .dir-grid{grid-template-columns:1fr}
}

/* ===== MARCA BILBAO ===== */
.login-logo{display:block;max-width:230px;width:70%;height:auto;margin:0 auto 8px}
.login-mascot{display:block;width:128px;height:128px;border-radius:50%;object-fit:cover;margin:0 auto 14px;
  background:var(--pine-tint);box-shadow:0 10px 26px -10px rgba(74,139,196,.55);animation:mascotIn .5s ease}
@keyframes mascotIn{from{transform:scale(.85) translateY(6px);opacity:0}to{transform:none;opacity:1}}
.sidebar-brand{background:#fff;border-radius:12px;padding:11px 13px;margin:0 4px 24px;box-shadow:0 4px 12px -6px rgba(0,0,0,.25)}
.sidebar-brand img{display:block;width:100%;height:auto}
.es-mascot{width:96px;height:96px;border-radius:50%;object-fit:cover;margin:0 auto 12px;display:block;
  background:var(--pine-tint);opacity:.95}
.bar-mascot{width:38px;height:38px;border-radius:50%;object-fit:cover;flex:none;background:var(--pine-tint);
  box-shadow:0 3px 8px -3px rgba(74,139,196,.6)}
.bar-logo{height:34px;width:auto;flex:none;display:none}
.nav-exit{color:#C5D6D1;margin-top:2px}
.nav-exit:hover{background:rgba(255,255,255,.10);color:#fff}
@media (max-width:860px){
  .bar-logo{display:block;height:30px}
  .topbar .btn-primary .btn-label{display:none}
  .topbar .btn-primary{padding:10px}
  .mnav-item{font-size:9.5px;padding:6px 1px}
  .mnav-item svg{width:20px;height:20px}
}
/* ===== TAREAS Y MANTENIMIENTO ===== */
.add-card{background:var(--surface);border:1px solid var(--line);border-radius:var(--radius);padding:16px 18px;
  margin-bottom:16px;box-shadow:var(--shadow)}
.add-card .ac-row{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:10px}
.add-card input,.add-card textarea,.add-card select{border:1px solid var(--line);border-radius:10px;padding:10px 12px;font-size:14px;width:100%}
.add-card input:focus,.add-card textarea:focus,.add-card select:focus{outline:none;border-color:var(--pine);box-shadow:0 0 0 3px var(--pine-tint)}
.add-card textarea{resize:vertical;min-height:54px}
.add-card .ac-mini{font-size:12px;font-weight:600;color:var(--ink-soft);margin:4px 0 6px}
.task{display:flex;align-items:flex-start;gap:12px;background:var(--surface);border:1px solid var(--line);
  border-radius:var(--radius-sm);padding:14px 16px;margin-bottom:10px;box-shadow:var(--shadow)}
.task.done{opacity:.62}
.t-check{width:22px;height:22px;border-radius:7px;border:2px solid var(--line);flex:none;margin-top:1px;cursor:pointer;
  display:grid;place-items:center;transition:all .15s;background:var(--surface)}
.t-check:hover{border-color:var(--pine)}
.t-check.on{background:var(--pine);border-color:var(--pine)}
.t-check svg{width:13px;height:13px;color:#fff;opacity:0}
.t-check.on svg{opacity:1}
.t-main{flex:1;min-width:0}
.t-title{font-weight:600;font-size:14.5px}
.task.done .t-title{text-decoration:line-through}
.t-notes{font-size:13px;color:var(--ink-soft);margin-top:3px;white-space:pre-wrap}
.t-meta{display:flex;flex-wrap:wrap;gap:7px;margin-top:8px;align-items:center}
.t-due{font-size:11.5px;font-weight:700;padding:3px 9px;border-radius:6px;background:var(--surface-2);color:var(--ink-soft)}
.t-due.today{background:var(--importante-tint);color:var(--importante)}
.t-due.over{background:var(--urgente-tint);color:var(--urgente)}
.t-rem{font-size:11px;font-weight:600;color:var(--ink-faint);display:inline-flex;align-items:center;gap:5px;
  background:var(--surface-2);border:1px solid var(--line-soft);padding:3px 8px;border-radius:6px}
.t-del{flex:none;color:var(--ink-faint);font-size:13px;padding:4px 6px;border-radius:7px}
.t-del:hover{background:var(--urgente-tint);color:var(--urgente)}
.task-banner{background:var(--importante-tint);border:1px solid #f0dcb6;color:#8a5a14;border-radius:11px;
  padding:11px 15px;font-size:13.5px;font-weight:600;margin-bottom:16px;display:flex;align-items:center;gap:9px}
.task-banner svg{width:17px;height:17px;flex:none}
/* mantenimiento */
.mt{background:var(--surface);border:1px solid var(--line);border-radius:var(--radius);padding:16px 18px;
  margin-bottom:12px;box-shadow:var(--shadow);position:relative;overflow:hidden}
.mt .mt-rail{position:absolute;left:0;top:0;bottom:0;width:4px}
.mt-head{display:flex;align-items:flex-start;gap:10px;margin-bottom:6px}
.mt-title{font-weight:600;font-size:15.5px;flex:1;min-width:0}
.st-badge{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.05em;padding:4px 9px;border-radius:6px;white-space:nowrap}
.st-pendiente{background:var(--surface-2);color:var(--ink-soft)}
.st-proceso{background:var(--info-tint);color:var(--info)}
.st-terminado{background:var(--pine-tint);color:var(--pine-dark)}
.st-material{background:var(--importante-tint);color:var(--importante)}
.mt-desc{font-size:13.5px;color:var(--ink-soft);margin-bottom:8px;white-space:pre-wrap}
.mt-meta{display:flex;flex-wrap:wrap;gap:8px;font-size:12px;color:var(--ink-faint);align-items:center}
.mt-loc{background:var(--surface-2);border:1px solid var(--line-soft);border-radius:6px;padding:3px 9px;font-weight:600;color:var(--ink-soft)}
.mt-actions{margin-top:12px;padding-top:12px;border-top:1px solid var(--line-soft);display:flex;gap:8px;flex-wrap:wrap}
.mt-act{border:1px solid var(--line);border-radius:9px;padding:7px 13px;font-size:13px;font-weight:600;color:var(--ink-soft);transition:all .15s}
.mt-act:hover{border-color:var(--pine);color:var(--pine)}
.mt-act.done{border-color:var(--pine);background:var(--pine);color:#fff}
.dir-actions{display:flex;gap:6px;flex:none}
.dir-actions button{width:30px;height:30px;border-radius:8px;border:1px solid var(--line);background:var(--surface);
  display:grid;place-items:center;color:var(--ink-soft);transition:all .15s}
.dir-actions button:hover{border-color:var(--pine);color:var(--pine)}
.dir-actions button svg{width:15px;height:15px}
.dir-card{align-items:center}
.nav-item.notif-on{color:var(--pine)}
.nav-item.notif-on svg{color:var(--pine)}
</style>
</head>

<!-- ===================== MODAL COMPOSE ===================== -->
<div class="modal-bg" id="modalBg">
  <div class="modal">
    <h3>Nuevo aviso</h3>
    <p class="m-sub">Llega solo a quien lo dirijas. Lo urgente envía notificación.</p>
    <div class="field">
      <label for="fTitle">Título</label>
      <input id="fTitle" type="text" placeholder="Ej. Junta de consejo técnico" maxlength="90">
    </div>
    <div class="field">
      <label for="fBody">Mensaje</label>
      <textarea id="fBody" placeholder="Escribe el aviso…"></textarea>
    </div>
    <div class="field">
      <label>Prioridad</label>
      <div class="prio-pick" id="prioPick"></div>
    </div>
    <div class="field">
      <label for="fAud">Dirigido a</label>
      <select id="fAud"></select>
    </div>

    <div class="field">
      <label>Documento de la actividad <span class="opt">(opcional)</span></label>
      <input type="file" id="fFile" hidden onchange="onFilePick(this)">
      <button type="button" class="attach-btn" id="attachBtn" onclick="document.getElementById('fFile').click()">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m21.44 11.05-9.19 9.19a6 6 0 0 1-8.49-8.49l9.19-9.19a4 4 0 0 1 5.66 5.66l-9.2 9.19a2 2 0 0 1-2.83-2.83l8.49-8.48"/></svg>
        Adjuntar documento
      </button>
      <div id="fileChip"></div>
    </div>

    <div class="field">
      <button type="button" class="sched-toggle" id="schedToggle" onclick="toggleSchedule()">
        <span class="switch" id="schedSwitch"><span class="knob"></span></span>
        <span><strong>Programar en el calendario</strong><br><span class="sched-hint">Agenda la actividad y avisa a quien la reciba</span></span>
      </button>
      <div id="schedFields" class="sched-fields">
        <div class="sched-row">
          <div style="flex:1"><label for="fDate">Fecha</label><input id="fDate" type="date"></div>
          <div style="flex:1"><label for="fTime">Hora <span class="opt">(opcional)</span></label><input id="fTime" type="time"></div>
        </div>
        <label style="margin-top:14px">Tipo de actividad</label>
        <select id="fCat">
          <option value="academico">Académica</option>
          <option value="administrativo">Administrativa</option>
          <option value="junta">Junta / reunión</option>
        </select>
        <label style="margin-top:14px">Recordatorios</label>
        <div class="rem-pick" id="remPick"></div>

  return AVISOS.filter(a=>audById(a.aud).match(me)).sort((x,y)=>y.ts-x.ts);
}
function sinLeerCount(){
  return avisosParaMi().filter(a=>!a.read.includes(me.id)).length;
}
function tareasAlertaCount(){   // mis tareas vencidas o para hoy, sin terminar
  const h=hoyISO();
  return PTAREAS.filter(t=>t.owner===me.id && !t.done && t.due && t.due<=h).length;
}

  const n = sinLeerCount();

function relTime(ts){
  const d=Math.floor((Date.now()-ts)/1000);
  if(d<3600) return `hace ${Math.max(1,Math.floor(d/60))} min`;
  if(d<86400) return `hace ${Math.floor(d/3600)} h`;
  return `hace ${Math.floor(d/86400)} d`;
}

function renderAvisos(){
  const chips = [['all','Todos',null],['urgente','Urgentes','var(--urgente)'],
    ['importante','Importantes','var(--importante)'],['info','Informativos','var(--info)']]
    .map(([v,l,col])=>`<button class="chip ${filterPrio===v?'active':''}" onclick="setPrio('${v}')">
      ${col?`<span class="dot" style="background:${col}"></span>`:''}${l}</button>`).join('');

  const audOpts = `<select class="seg-select" onchange="setAud(this.value)">
    ${audOptions(filterAud, true)}
  </select>`;

  let list = avisosParaMi();
  if(filterPrio!=='all') list=list.filter(a=>a.prio===filterPrio);
  if(filterAud!=='all')  list=list.filter(a=>a.aud===filterAud);

  const cards = list.length ? list.map(renderAviso).join('') : `
    <div class="empty">
      <img class="es-mascot" src="${MASCOT}" alt="">
      <div>No hay avisos con ese filtro.</div>
    </div>`;

  return `<div class="filters">${chips}${audOpts}</div>${cards}`;
}

function renderAviso(a){
  const p = PRIOS[a.prio];
  const recs = recipients(a.aud);
  const total = recs.length;
  const readN = a.read.filter(id=>recs.some(r=>r.id===id)).length;
  const pct = total? Math.round(readN/total*100):0;
  const iRead = a.read.includes(me.id);
  const aud = audById(a.aud).label;
  const canSeeStats = puedePublicar(me) || a.author===me.name;

  // pendientes (solo para quien publica / autor)
  const pendientes = recs.filter(r=>!a.read.includes(r.id)).map(r=>r.name.split(' ')[0]);
  const pendTxt = pendientes.length ? `Faltan: ${pendientes.join(', ')}` : 'Todos confirmaron ✓';

  return `<article class="aviso">
    <div class="rail" style="background:${p.color}"></div>
    <div class="aviso-head">
      <span class="prio-tag" style="background:${p.tint};color:${p.color}">${p.label}</span>
      <h3 class="aviso-title">${escapeHtml(a.title)}</h3>
    </div>
    <div class="aviso-body">${escapeHtml(a.body)}</div>
    <div class="aviso-meta">
      <span class="aud-tag">${aud}</span>
      <span>${escapeHtml(a.author)}</span><span>·</span><span>${relTime(a.ts)}</span>
    </div>
    ${activityStrip(a)}
    <div class="aviso-foot">
      ${canSeeStats ? `<div class="readbar">
        <div class="readbar-top"><span>${readN} de ${total} confirmaron</span><span>${pct}%</span></div>
        <div class="readbar-track"><div class="readbar-fill" style="width:${pct}%"></div></div>
        <div class="pending-link" title="${pendTxt}" style="margin-top:6px;cursor:default">${pendTxt}</div>
      </div>` : `<div class="readbar"><div class="readbar-top"><span>${readN} de ${total} confirmaron</span><span>${pct}%</span></div>
        <div class="readbar-track"><div class="readbar-fill" style="width:${pct}%"></div></div></div>`}
      <button class="btn-confirm ${iRead?'done':''}" ${iRead?'':`onclick="confirmRead(${a.id})"`}>
        ${iRead?`<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M20 6 9 17l-5-5"/></svg> Confirmado`
               :'Confirmar lectura'}
      </button>
    </div>
  </article>`;
}

function confirmRead(id){
  const a=AVISOS.find(x=>String(x.id)===String(id));
  if(a && !a.read.includes(me.id)){a.read.push(me.id);if(window.CLOUD)CLOUD.saveRead(a.id,me.id);toast('Lectura confirmada');render();}
}

/* tira de actividad: fecha programada, documento adjunto y recordatorios */
function fmtEventDate(ev){
  const opts={weekday:'short',day:'numeric',month:'short'};
  let s=ev.date.toLocaleDateString('es-MX',opts);
  if(ev.time) s+=` · ${ev.time}`;
  return s.charAt(0).toUpperCase()+s.slice(1);
}
function activityStrip(a){
  const parts=[];
  if(a.event){
    parts.push(`<span class="act-chip cal">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="18" rx="2"/><path d="M16 2v4M8 2v4M3 10h18"/></svg>
      ${fmtEventDate(a.event)}</span>`);
    (a.event.reminders||[]).forEach(r=>parts.push(`<span class="act-chip rem">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9M13.73 21a2 2 0 0 1-3.46 0"/></svg>
      ${r}</span>`));
  }
  if(a.file){
    parts.push(`<button class="act-chip doc" onclick="openFile(${a.id})">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><path d="M14 2v6h6"/></svg>
      ${escapeHtml(a.file.name)}</button>`);
  }
  return parts.length? `<div class="act-strip">${parts.join('')}</div>`:'';
}
function openFile(id){
  const a=AVISOS.find(x=>String(x.id)===String(id));
  if(!a||!a.file) return;
  if(a.file.url) window.open(a.file.url,'_blank');
  else toast('En producción se abre el archivo desde Drive');
}

/* ---------- CALENDARIO ---------- */
const MESES=['Enero','Febrero','Marzo','Abril','Mayo','Junio','Julio','Agosto','Septiembre','Octubre','Noviembre','Diciembre'];
const DOW=['Dom','Lun','Mar','Mié','Jue','Vie','Sáb'];
function renderCalendario(){
  const y=calDate.getFullYear(), m=calDate.getMonth();
  const first=new Date(y,m,1).getDay();
  const days=new Date(y,m+1,0).getDate();
  const prevDays=new Date(y,m,0).getDate();
  const today=new Date();
  let cells='';
  for(let i=0;i<first;i++) cells+=`<div class="cal-day out"><div class="dnum">${prevDays-first+i+1}</div></div>`;
  for(let d=1;d<=days;d++){
    const isToday = d===today.getDate()&&m===today.getMonth()&&y===today.getFullYear();
    const evs=EVENTOS.filter(e=>e.date.getDate()===d&&e.date.getMonth()===m&&e.date.getFullYear()===y);
    cells+=`<div class="cal-day in ${isToday?'today':''}">
      <div class="dnum">${d}</div>
      ${evs.map(e=>`<div class="cal-ev" style="background:${e.color}" title="${e.title}" onclick="openEvent(${EVENTOS.indexOf(e)})">${e.title}</div>`).join('')}
    </div>`;
  }
  const totalCells=first+days; const trail=(7-totalCells%7)%7;
  for(let i=1;i<=trail;i++) cells+=`<div class="cal-day out"><div class="dnum">${i}</div></div>`;

  return `<div class="cal-head">
      <button class="cal-nav" onclick="calMove(-1)"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"><path d="M15 18l-6-6 6-6"/></svg></button>
      <h3>${MESES[m]} ${y}</h3>
      <button class="cal-nav" onclick="calMove(1)"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"><path d="M9 18l6-6-6-6"/></svg></button>
    </div>
    <div class="cal-grid">
      ${DOW.map(d=>`<div class="cal-dow">${d}</div>`).join('')}
      ${cells}
    </div>`;
}
function calMove(n){calDate=new Date(calDate.getFullYear(),calDate.getMonth()+n,1);render();}

const CAT_LABEL={academico:'Académico',administrativo:'Administrativo',junta:'Junta'};
function openEvent(i){
  const ev=EVENTOS[i]; if(!ev) return;
  const d=ev.date;
  const sameDay=a=>a.date.getDate()===d.getDate()&&a.date.getMonth()===d.getMonth()&&a.date.getFullYear()===d.getFullYear();
  // Busca el aviso que originó este evento para mostrar toda la info (cuerpo, recordatorios, adjunto).
  const src=AVISOS.find(a=>a.event&&a.title===ev.title&&a.event.date&&sameDay({date:new Date(a.event.date)}));
  const time = (src&&src.event&&src.event.time) || ev.time || '';
  const reminders = (src&&src.event&&src.event.reminders) || ev.reminders || [];
  const body = src? src.body : (ev.body||'');
  const file = src? src.file : ev.file;
  const audLabel = src? audById(src.aud).label : '';
  const fechaTxt = `${d.getDate()} de ${MESES[d.getMonth()]} de ${d.getFullYear()}${time?` · ${time}`:''}`;
  const fileHtml = file ? (file.url
      ? `<a class="ev-file" href="${file.url}" target="_blank" rel="noopener"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><path d="M14 2v6h6"/></svg>${escapeHtml(file.name)}</a>`
      : `<div class="ev-file no-dl"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><path d="M14 2v6h6"/></svg>${escapeHtml(file.name)} <span class="ev-note">(adjunto)</span></div>`)
    : '';
  document.getElementById('eventModal').innerHTML=`
    <div class="ev-cat" style="background:${ev.color}">${CAT_LABEL[ev.cat]||ev.cat||'Evento'}</div>
    <h3 style="margin:8px 0 2px">${escapeHtml(ev.title)}</h3>
    <p class="m-sub" style="margin-top:0">${fechaTxt}</p>
    ${audLabel?`<div class="ev-aud">Dirigido a: ${audLabel}</div>`:''}
    ${body?`<p class="ev-body">${escapeHtml(body)}</p>`:''}
    ${reminders.length?`<div class="ev-rem-title">Recordatorios</div><div class="ev-rem">${reminders.map(r=>`<span>${r}</span>`).join('')}</div>`:''}
    ${fileHtml?`<div class="ev-rem-title">Documento adjunto</div>${fileHtml}`:''}
    <div class="modal-actions"><button class="btn-primary" onclick="closeEventModal()">Cerrar</button></div>`;
  document.getElementById('eventBg').classList.add('active');
}
function closeEventModal(){document.getElementById('eventBg').classList.remove('active');}

/* ----- Editor de horarios ----- */
function emptyMat(){ return Array.from({length:5},()=>Array(7).fill(null)); }
function schedOf(uid){ if(!SCHEDULES[uid]) SCHEDULES[uid]=emptyMat(); return SCHEDULES[uid]; }
function renderEditorHorarios(){

  if(!docs.length) return `<div style="padding:40px;text-align:center;color:var(--ink-faint)">No hay docentes dados de alta todavía. Agrégalos en Directorio.</div>`;

    </select></div>`;
  const tools = esManager() ? `
    <button class="mini-btn" onclick="document.getElementById('csvIn').click()">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4M7 10l5 5 5-5M12 15V3"/></svg>
      Subir CSV</button>
    <input type="file" id="csvIn" accept=".csv,text/csv" hidden onchange="importCSV(this)">
    <button class="mini-btn" onclick="downloadPlantilla()">

      Plantilla</button>` : '';
  const hint = esManager() ? `<p class="fc-sub" style="margin:-6px 0 14px">Toca una celda para alternar entre <strong>clase</strong> y <strong>hora libre</strong>. La hora libre es la que se usa para asignar suplencias.</p>` : '';

  const mat = schedOf(horTeacher);
  const head = `<tr><th class="ph">Hora</th>${DIAS.map(d=>`<th>${d}</th>`).join('')}</tr>`;
  const rows = PERIODOS.map((per,p)=>`<tr>
    <td class="ph">${per.n}ª<small>${per.time}</small></td>
    ${DIAS.map((d,di)=>{const cell=mat[di][p];
      return `<td><div class="sg-cell ${cell?'busy':'free'}" ${esManager()?`onclick="toggleCell('${horTeacher}',${di},${p})"`:''}>${cell?cell.group:'Libre'}</div></td>`;
    }).join('')}
  </tr>`).join('');

  return `<div class="row-ctrl">${teacherSel}<div style="flex:1"></div>${tools}</div>${hint}
    <div class="sg-wrap"><table class="sg"><thead>${head}</thead><tbody>${rows}</tbody></table></div>

      <span><span class="lg-sq" style="background:var(--pine-tint)"></span>Clase asignada</span>
      <span><span class="lg-sq" style="background:repeating-linear-gradient(45deg,#fff,#fff 3px,var(--surface-2) 3px,var(--surface-2) 6px);border:1px solid var(--line)"></span>Hora libre (disponible para suplir)</span>
    </div>`;
}
function selTeacher(id){horTeacher=id;render();}
function toggleCell(uid,d,p){
  const m=schedOf(uid);
  m[d][p] = m[d][p] ? null : {group:(GRUPOS_SEC[userById(uid).area]||['G'])[(p+d)%(GRUPOS_SEC[userById(uid).area]||['G']).length]};
  if(window.CLOUD) CLOUD.saveSchedule(uid, SCHEDULES[uid]);
  render();
}
function downloadPlantilla(){
  let csv='profesor_id,profesor,dia(0-4),periodo(1-7),grupo\n';
  docentes().forEach(u=>{for(let d=0;d<5;d++)for(let p=0;p<7;p++){const c=schedOf(u.id)[d][p];if(c)csv+=`${u.id},${u.name},${d},${p+1},${c.group}\n`;}});
  const blob=new Blob([csv],{type:'text/csv'});const a=document.createElement('a');
  a.href=URL.createObjectURL(blob);a.download='horarios_plantilla.csv';a.click();URL.revokeObjectURL(a.href);
  toast('Plantilla descargada');
}
function importCSV(input){
  const f=input.files&&input.files[0]; if(!f) return;
  const r=new FileReader();
  r.onload=()=>{ try{
    const lines=r.result.split(/\r?\n/).filter(Boolean); lines.shift(); // quita encabezado
    // limpia horarios de los profesores que aparezcan en el archivo
    const tocados=new Set();
    lines.forEach(l=>{const c=l.split(',');const id=c[0].trim();if(SCHEDULES[id]&&!tocados.has(id)){
      SCHEDULES[id]=Array.from({length:5},()=>Array(7).fill(null));tocados.add(id);}});
    let n=0;
    lines.forEach(l=>{const c=l.split(',');const id=c[0].trim();const d=+c[2],p=+c[3]-1,g=(c[4]||'').trim();
      if(SCHEDULES[id]&&d>=0&&d<5&&p>=0&&p<7){SCHEDULES[id][d][p]={group:g||'—'};n++;}});
    input.value='';
    if(window.CLOUD) tocados.forEach(id=>CLOUD.saveSchedule(id, SCHEDULES[id]));
    toast(`Horario importado (${n} clases, ${tocados.size} profesores)`); render();
  }catch(e){toast('No se pudo leer el CSV');} };
  r.readAsText(f);
}

/* ----- Motor de suplencias (equitativo) ----- */
// ¿La persona c está ocupada el día d, periodo p? (clase propia o ya cubriendo otra falta)
function ocupado(cid,d,p){
  if(schedOf(cid)[d][p]) return true;
  return absences.some(ab=>ab.day===d && ab.asign.some(a=>a.p===p && a.subId===cid));
}
function ausenteEseDia(cid,d){return absences.some(ab=>ab.teacherId===cid && ab.day===d);}

function asignarSuplencias(teacherId,d,periodos){
  const T=userById(teacherId); const sec=T.area;
  const pool=docentesDe(sec).filter(u=>u.id!==teacherId);
  const asign=[];
  for(let p=0;p<7;p++){
    const cell=schedOf(teacherId)[d][p];
    if(!cell) continue;                       // hora libre del ausente: no hay que cubrir
    if(periodos && !periodos.includes(p)) continue;  // reunión: solo las horas elegidas
    const libres=pool.filter(c=>!ocupado(c.id,d,p) && !ausenteEseDia(c.id,d));
    if(!libres.length){asign.push({p,group:cell.group,subId:null});continue;}
    // el más justo: menor número de horas cubiertas; desempate alfabético
    libres.sort((a,b)=> (coverCount[a.id]-coverCount[b.id]) || a.name.localeCompare(b.name));
    const elegido=libres[0];
    coverCount[elegido.id]++;
    asign.push({p,group:cell.group,subId:elegido.id});
  }
  return asign;
}

function renderSuplencias(){
  const docs=docentes();
  const ausentesHoy = absences.filter(a=>a.day===supDay).map(a=>a.teacherId);
  // profesor seleccionado por defecto: el primero disponible
  const disponibles = docs.filter(u=>!ausentesHoy.includes(u.id));
  if(!supTeacher || ausentesHoy.includes(supTeacher) || !docs.some(u=>u.id===supTeacher)){
    supTeacher = disponibles.length ? disponibles[0].id : (docs[0]&&docs[0].id);
  }
  // horas con clase del profesor seleccionado ese día (las que se pueden cubrir)
  const clasesDelDia = [];
  if(supTeacher && SCHEDULES[supTeacher]) for(let p=0;p<7;p++){ if(SCHEDULES[supTeacher][supDay][p]) clasesDelDia.push(p); }

  const horasUI = supMotivo==='reunion' ? `
    <div style="width:100%;margin-top:4px">
      <div class="ac-mini" style="margin:2px 0 8px">Horas que estará en reunión (se cubren solo estas)</div>
      ${clasesDelDia.length ? `<div class="rem-pick">${clasesDelDia.map(p=>`
        <button type="button" class="rem-opt ${supPeriodos.includes(p)?'sel':''}" onclick="toggleSupPeriodo(${p})">${PERIODOS[p].n}ª · ${PERIODOS[p].time} · ${SCHEDULES[supTeacher][supDay][p].group}</button>`).join('')}</div>`
        : `<div style="font-size:13px;color:var(--ink-faint)">Ese profesor no tiene clases ese día.</div>`}
    </div>` : '';

  const form = esManager() ? `<div class="add-card">
    <div class="ac-row">
      <div class="ctrl" style="flex:1;min-width:120px"><label>Día</label>
        <select onchange="setSupDay(this.value)">${DIAS.map((d,i)=>`<option value="${i}"${i===supDay?' selected':''}>${d}</option>`).join('')}</select></div>
      <div class="ctrl" style="flex:2;min-width:170px"><label>Profesor</label>
        <select onchange="setSupTeacher(this.value)">${SECCIONES.map(s=>`<optgroup label="${s}">${docentesDe(s).map(u=>`<option value="${u.id}"${u.id===supTeacher?' selected':''}${ausentesHoy.includes(u.id)?' disabled':''}>${u.name}${ausentesHoy.includes(u.id)?' (ya registrado)':''}</option>`).join('')}</optgroup>`).join('')}</select></div>
    </div>
    <div class="ac-row">
      <div class="ctrl" style="flex:1;min-width:200px"><label>Motivo</label>
        <select onchange="setSupMotivo(this.value)">
          <option value="falta"${supMotivo==='falta'?' selected':''}>No asistió (todo el día)</option>
          <option value="reunion"${supMotivo==='reunion'?' selected':''}>Reunión o permiso (horas específicas)</option>
        </select></div>
    </div>
    ${horasUI}
    <button class="btn-primary" style="margin-top:12px" onclick="registrarFalta()">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"><path d="M12 5v14M5 12h14"/></svg>
      Registrar y asignar suplentes</button>
    ${absences.length?`<button class="mini-btn" onclick="resetSuplencias()" style="margin-left:10px">Reiniciar</button>`:''}
  </div>` : '';

  const delDia = absences.filter(a=>a.day===supDay);
  const cards = delDia.length ? delDia.map(renderAbsenceCard).join('') :
    `<div class="empty"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6"><path d="M9 11l3 3L22 4M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11"/></svg>
      <div>Sin registros para ${DIAS[supDay]}.</div></div>`;

  return form + cards + renderEquidad();
}
function setSupDay(v){supDay=+v;supPeriodos=[];render();}
function setSupTeacher(id){supTeacher=id;supPeriodos=[];render();}
function setSupMotivo(v){supMotivo=v;supPeriodos=[];render();}
function toggleSupPeriodo(p){supPeriodos.includes(p)?supPeriodos=supPeriodos.filter(x=>x!==p):supPeriodos.push(p);render();}
function registrarFalta(){
  const id=supTeacher;
  if(!id){toast('Elige un profesor');return;}
  if(absences.some(a=>a.teacherId===id&&a.day===supDay)){toast('Ese profesor ya está registrado ese día');return;}
  if(supMotivo==='reunion' && supPeriodos.length===0){toast('Elige al menos una hora a cubrir');return;}
  const periodos = supMotivo==='reunion' ? supPeriodos.slice() : null;
  const asign=asignarSuplencias(id,supDay,periodos);
  if(!asign.length){toast(supMotivo==='reunion'?'Esas horas no tienen clase que cubrir':'Ese profesor no tiene clases ese día');return;}
  const absence={teacherId:id,day:supDay,motivo:supMotivo,asign};
  absences.push(absence);
  if(window.CLOUD) CLOUD.saveAbsence(absence);
  supPeriodos=[];
  const sinCobertura=asign.filter(a=>!a.subId).length;
  toast(sinCobertura? `Suplentes asignados · ${sinCobertura} hora(s) sin cobertura`:'Suplentes asignados equitativamente');
  render();
}
function resetSuplencias(){absences=[];docentes().forEach(u=>coverCount[u.id]=0);toast('Suplencias reiniciadas');render();}

function renderAbsenceCard(ab){
  const T=userById(ab.teacherId);
  const idx=absences.indexOf(ab);
  const rows=ab.asign.map((a,ri)=>{
    const per=PERIODOS[a.p];
    // candidatos válidos para reasignar manualmente
    const pool=docentesDe(T.area).filter(u=>u.id!==T.id);
    const opts=pool.filter(c=> c.id===a.subId || (!ocupado(c.id,ab.day,a.p)&&!ausenteEseDia(c.id,ab.day)) )
      .sort((x,y)=>(coverCount[x.id]-coverCount[y.id])||x.name.localeCompare(y.name));
    const sel = esManager()
      ? `<select class="${a.subId?'':'nocover'}" onchange="reasignar(${idx},${ri},this.value)">
          <option value=""${a.subId?'':' selected'}>— Sin cobertura —</option>
          ${opts.map(c=>`<option value="${c.id}"${c.id===a.subId?' selected':''}>${c.name} · ${coverCount[c.id]} h</option>`).join('')}
        </select>`
      : (a.subId?`<span class="as-sub">${userById(a.subId).name}</span>`:`<span class="nocover-txt">Sin cobertura</span>`);
    return `<div class="asgn ${a.subId?'':'nocover'}">
      <span class="as-per">${per.n}ª hora<small>${per.time}</small></span>
      <span class="as-grp">${a.group}</span>
      <span class="as-arrow"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M5 12h14M13 6l6 6-6 6"/></svg></span>
      ${sel}
    </div>`;
  }).join('');
  return `<div class="absence-card">
    <div class="absence-head">
      <span class="ah-name">${T.name}</span>
      <span class="ah-tag ${ab.motivo==='reunion'?'meet':''}">${ab.motivo==='reunion'?'Reunión':'No asistió'}</span>
      <span class="ah-sec">${T.area} · ${DIAS[ab.day]}</span>
      ${esManager()?`<button class="ah-rm" onclick="quitarFalta(${idx})">Quitar</button>`:''}
    </div>${rows}
  </div>`;
}
function quitarFalta(idx){
  const ab=absences[idx]; if(!ab) return;
  ab.asign.forEach(a=>{if(a.subId&&coverCount[a.subId]>0)coverCount[a.subId]--;});
  if(window.CLOUD) CLOUD.removeAbsence(ab);
  absences.splice(idx,1); toast('Inasistencia eliminada'); render();
}
function reasignar(idx,ri,newId){
  const a=absences[idx].asign[ri];
  if(a.subId&&coverCount[a.subId]>0)coverCount[a.subId]--;
  a.subId = newId||null;
  if(a.subId)coverCount[a.subId]++;
  if(window.CLOUD) CLOUD.saveAbsence(absences[idx]);
  render();
}

function renderEquidad(){
  const docs=docentes().slice().sort((a,b)=>coverCount[b.id]-coverCount[a.id]||a.name.localeCompare(b.name));
  const max=Math.max(1,...docs.map(u=>coverCount[u.id]));
  const conHoras=docs.filter(u=>coverCount[u.id]>0);
  const lista=(conHoras.length?conHoras:docs.slice(0,6));
  const total=docs.reduce((s,u)=>s+coverCount[u.id],0);
  return `<div class="fair-card">
    <h4>Carga de suplencias</h4>
    <div class="fc-sub">Horas que ha cubierto cada profesor — el sistema asigna siempre a quien menos lleva. Total: ${total} h</div>
    ${lista.map(u=>`<div class="cover-row">
      <span class="cr-name">${u.name}</span>
      <span class="cr-track"><span class="cr-fill" style="width:${coverCount[u.id]/max*100}%"></span></span>
      <span class="cr-n">${coverCount[u.id]} h</span>
    </div>`).join('')}
    <div class="fair-foot">
      <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 3v18M3 7h18M5 7l3 7H2zM19 7l3 7h-6z"/></svg>
      Reparto equitativo dentro de cada sección
    </div>
  </div>`;
}

/* ----- Mis tareas (personales) ----- */
function dueChip(t){
  if(!t.due) return '';
  const h=hoyISO(); let cls='', txt=fmtDue(t.due,t.time);
  if(!t.done && t.due<h) cls='over', txt='Venció · '+txt;
  else if(!t.done && t.due===h) cls='today', txt='Hoy'+(t.time?' · '+t.time:'');
  return `<span class="t-due ${cls}">${txt}</span>`;
}
function fmtDue(due,time){
  const [y,m,d]=due.split('-').map(Number);
  let s=new Date(y,m-1,d).toLocaleDateString('es-MX',{weekday:'short',day:'numeric',month:'short'});
  s=s.charAt(0).toUpperCase()+s.slice(1);
  return time? s+' · '+time : s;
}

    </div>
    <button class="t-del" onclick="delTarea(${t.id})" title="Eliminar">✕</button>
  </div>`).join('') : `<div class="empty"><img class="es-mascot" src="${MASCOT}" alt=""><div>No tienes pendientes. ¡Bien!</div></div>`;

  return form + banner + list;

      const subOrder=['Administración','Transporte','Mantenimiento e Intendencia','Seguridad','Enfermería','Cafetería'];
      const subNames=Object.keys(subs).sort((a,b)=>subOrder.indexOf(a)-subOrder.indexOf(b));
      return `<div class="area-label">Administración</div>`+
        subNames.map(s=>`<div class="sub-label">${s}</div><div class="dir-grid">${subs[s].map(card).join('')}</div>`).join('');
    }
    return `<div class="area-label">${area}</div><div class="dir-grid">${list.map(card).join('')}</div>`;
  }).join('');
  return addBtn + body;
}

/* ----- Importar personal desde CSV (solo Dirección) ----- */
function pickCsv(){ if(!esDireccion()) return; document.getElementById('csvInput').click(); }
function handleCsvFile(input){
  const file = input.files && input.files[0]; if(!file) return;
  const reader = new FileReader();
  reader.onload  = () => { try{ importCsvText(String(reader.result)); }catch(e){ toast('No se pudo procesar el CSV'); } input.value=''; };
  reader.onerror = () => { toast('No se pudo leer el archivo'); input.value=''; };
  reader.readAsText(file, 'UTF-8');
}
function parseCSV(text){
  text = text.replace(/^\ufeff/,'').replace(/\r\n/g,'\n').replace(/\r/g,'\n');
  const rows=[]; let field='', row=[], inQ=false;
  for(let i=0;i<text.length;i++){
    const ch=text[i];
    if(inQ){
      if(ch==='"'){ if(text[i+1]==='"'){field+='"';i++;} else inQ=false; }
      else field+=ch;
    } else {
      if(ch==='"') inQ=true;
      else if(ch===','){ row.push(field); field=''; }
      else if(ch==='\n'){ row.push(field); rows.push(row); row=[]; field=''; }
      else field+=ch;
    }
  }
  if(field.length||row.length){ row.push(field); rows.push(row); }
  return rows.filter(r=>r.some(c=>c.trim()!==''));
}
function normRole(v){
  const s=(v||'').trim().toLowerCase();
  if(['direccion','dirección','director','directora'].includes(s)) return 'direccion';
  if(['coordinacion','coordinación','coordinador','coordinadora','coord'].includes(s)) return 'coordinacion';
  if(['docente','maestro','maestra','profesor','profesora','teacher'].includes(s)) return 'docente';
  return 'personal';
}
function normArea(v, role){
  const s=(v||'').trim().toLowerCase();
  const found=AREAS_PERSONA.find(a=>a.toLowerCase()===s);
  if(found) return found;
  if(role==='direccion') return 'Dirección';
  if(role==='coordinacion') return 'Coordinación';
  if(role==='personal') return 'Administración';
  return 'Primaria';
}
function importCsvText(text){
  const rows=parseCSV(text);
  if(!rows.length){ toast('El archivo está vacío'); return; }
  const header=rows[0].map(h=>h.trim().toLowerCase());
  const hasHeader=header.some(h=>['nombre','name','correo','email','rol','role','area','área'].includes(h));
  const col = hasHeader ? {
    nombre: header.findIndex(h=>['nombre','name'].includes(h)),
    correo: header.findIndex(h=>['correo','email','e-mail'].includes(h)),
    rol:    header.findIndex(h=>['rol','role'].includes(h)),
    area:   header.findIndex(h=>['area','área','seccion','sección'].includes(h)),
    subarea:header.findIndex(h=>['subarea','subárea','sub'].includes(h)),
    cargo:  header.findIndex(h=>['cargo','puesto'].includes(h)),
  } : {nombre:0,correo:1,rol:2,area:3,subarea:4,cargo:5};
  const data = hasHeader ? rows.slice(1) : rows;
  let added=0, updated=0, skipped=0;
  data.forEach(r=>{
    const g=k=> (col[k]>=0 && r[col[k]]!=null) ? r[col[k]].trim() : '';
    const name=g('nombre'), email=g('correo');
    if(!name || !email){ skipped++; return; }
    const role=normRole(g('rol'));
    const area=normArea(g('area'), role);
    const subarea = area==='Administración' ? (g('subarea')||'Administración') : undefined;
    const roleLabel=autoLabel(role,area,subarea,g('cargo'));
    const existing=USERS.find(u=>u.email && u.email.toLowerCase()===email.toLowerCase());
    if(existing){
      Object.assign(existing,{name,email,role,area,subarea,roleLabel});
      if(window.CLOUD) CLOUD.saveUsuario(existing); updated++;
    } else {
      const u={id:'u'+Date.now()+Math.floor(Math.random()*1000), name, email, role, area, subarea, roleLabel};
      USERS.push(u);
      if(window.CLOUD) CLOUD.saveUsuario(u); added++;
    }
  });
  render();
  toast(`Importado: ${added} nuevos, ${updated} actualizados${skipped?`, ${skipped} omitidos`:''}`);
}
function downloadCsvTemplate(){
  const csv='\ufeff'+
    'nombre,correo,rol,area,subarea,cargo\n'+
    'Laura Mendoza,laura.mendoza@bilbao.edu.mx,direccion,Dirección,,Directora General\n'+

}

let __os = null, __osReady = false, __pendingTagUser = null;
function isSubscribed(){
  try { return !!(__os && __os.User.PushSubscription.optedIn); } catch(e){ return false; }
}
function refreshNotifBtn(){
  const btn = document.getElementById('notifBtn'), lbl = document.getElementById('notifLabel');
  const on = isSubscribed();
  if(btn && lbl){
    btn.style.display = '';                 // siempre visible en la barra (escritorio)
    lbl.textContent = on ? 'Notificaciones activadas' : 'Activar notificaciones';
    btn.classList.toggle('notif-on', on);
  }
  const banner = document.getElementById('notifBanner');
  if(banner) banner.style.display = on ? 'none' : 'flex';
  const bell = document.getElementById('notifBell');
  if(bell){
    bell.classList.toggle('on', on);
    bell.title = on ? 'Notificaciones activadas' : 'Activar notificaciones';
  }
}
async function toggleNotif(){
  if(!__os){ toast('Las notificaciones aún se cargan… intenta de nuevo en unos segundos'); return; }
  try {
    // 1) permiso del navegador (si aún no lo dio)
    if(!__os.Notifications.permission){ await __os.Notifications.requestPermission(); }
    // 2) asegurar la suscripción (re-suscribe si estaba desactivada / opted-out)
    try { await __os.User.PushSubscription.optIn(); } catch(e){}
    // 3) etiquetar por área/rol para poder segmentar
    if(typeof me !== 'undefined' && me) applyTags(me);
    await new Promise(r=>setTimeout(r, 900));
    refreshNotifBtn();
    toast(isSubscribed() ? 'Notificaciones activadas en este dispositivo ✓'
                         : 'Permite las notificaciones en el navegador para activarlas');
  } catch(e){ toast('No se pudo activar en este dispositivo'); }
}
// El módulo/lo demás llama a esto al entrar: etiqueta la suscripción con el área/rol.
window.notifOnLogin = function(u){
  refreshNotifBtn();
  if(!u) return;
  if(!__osReady){ __pendingTagUser = u; return; }   // se aplicará al terminar de cargar
  applyTags(u);
};
async function applyTags(u){
  try {
    await __os.User.addTags({ area: u.area || '', rol: u.role || '', seccion: u.subarea || u.area || '' });
    if(u.id != null) await __os.login(String(u.id));
  } catch(e){ /* silencioso */ }
}
if(location.protocol.startsWith('http')){
  window.OneSignalDeferred = window.OneSignalDeferred || [];
  window.OneSignalDeferred.push(async function(OneSignal){
    try {
      await OneSignal.init({
        appId: '7298a4ca-5e74-47c5-a7ef-33d12c46749e',
        serviceWorkerOverrideForTypical: true,
        serviceWorkerParam: { scope: '/Anuncios/' },
        serviceWorkerPath: 'Anuncios/sw.js',
        allowLocalhostAsSecureOrigin: true
      });
      __os = OneSignal; __osReady = true;
      refreshNotifBtn();
      try { OneSignal.User.PushSubscription.addEventListener('change', refreshNotifBtn); } catch(e){}
      try { OneSignal.Notifications.addEventListener('permissionChange', refreshNotifBtn); } catch(e){}
      if(__pendingTagUser){ applyTags(__pendingTagUser); __pendingTagUser = null; }
    } catch(e){ console.warn('OneSignal no se pudo iniciar:', e); }
  });
}

    if (!email || !pass) { showErr('Escribe tu correo y contraseña'); return; }
    try { await signInWithEmailAndPassword(auth, email, pass); }
    catch (e) { showErr('Correo o contraseña incorrectos'); }
  });

  // --- Conversión Firestore -> estructuras en memoria ---
  const toAviso = (id, d) => ({
    id, title: d.title, body: d.body, prio: d.prio, aud: d.aud, author: d.author,
    ts: d.ts || Date.now(), read: d.read || [],
    ...(d.event ? { event: { ...d.event, date: new Date(d.event.date), reminders: d.event.reminders || [] } } : {}),
    ...(d.file ? { file: d.file } : {})
  });

  async function loadAll() {
    const usuarios = [], avisos = [], eventos = [], schedules = {}, absences = [], ptareas = [], ordenes = [];
    (await getDocs(collection(db, 'usuarios'))).forEach(s => usuarios.push({ id: s.id, ...s.data() }));
    (await getDocs(collection(db, 'avisos'))).forEach(s => avisos.push(toAviso(s.id, s.data())));
    (await getDocs(collection(db, 'eventos'))).forEach(s => { const d = s.data(); eventos.push({ ...d, date: new Date(d.date) }); });
    (await getDocs(collection(db, 'horarios'))).forEach(s => { try { schedules[s.id] = JSON.parse(s.data().matJson); } catch (e) {} });
    (await getDocs(collection(db, 'absences'))).forEach(s => { const d = s.data(); absences.push({ teacherId: d.teacherId, day: d.day, motivo: d.motivo || 'falta', asign: d.asign || [] }); });
    (await getDocs(collection(db, 'tareas_personales'))).forEach(s => ptareas.push({ id: s.id, ...s.data() }));
    (await getDocs(collection(db, 'mantenimiento'))).forEach(s => ordenes.push({ id: s.id, ...s.data() }));
    avisos.sort((a, b) => b.ts - a.ts);
    return { usuarios, avisos, eventos, schedules, absences, ptareas, ordenes };
  }

  // --- Métodos de escritura que usa la app ---
  const serAviso = a => ({
    title: a.title, body: a.body, prio: a.prio, aud: a.aud, author: a.author, ts: a.ts, read: a.read || [],
    notified: false, sentReminders: [],
    ...(a.event ? { event: { time: a.event.time || '', cat: a.event.cat, color: a.event.color, reminders: a.event.reminders || [], date: a.event.date.toISOString() } } : {}),
    ...(a.file ? { file: { name: a.file.name } } : {})
  });
  window.CLOUD = {
    saveAviso: a => { setDoc(doc(db, 'avisos', String(a.id)), serAviso(a)); if (a.event) setDoc(doc(db, 'eventos', 'ev_' + a.id), { title: a.title, cat: a.event.cat, color: a.event.color, date: a.event.date.toISOString() }); },
    saveRead: (avisoId, uid) => updateDoc(doc(db, 'avisos', String(avisoId)), { read: arrayUnion(uid) }),
    saveAbsence: ab => setDoc(doc(db, 'absences', `${ab.teacherId}_${ab.day}`), { teacherId: ab.teacherId, day: ab.day, motivo: ab.motivo || 'falta', asign: ab.asign }),
    removeAbsence: ab => deleteDoc(doc(db, 'absences', `${ab.teacherId}_${ab.day}`)),
    saveSchedule: (uid, mat) => setDoc(doc(db, 'horarios', uid), { matJson: JSON.stringify(mat) }),
    saveTarea: t => setDoc(doc(db, 'tareas_personales', String(t.id)), { owner: t.owner, title: t.title, due: t.due || '', time: t.time || '', reminders: t.reminders || [], sentReminders: t.sentReminders || [], notes: t.notes || '', done: !!t.done, ts: t.ts }),
    removeTarea: id => deleteDoc(doc(db, 'tareas_personales', String(id))),
    saveOrden: o => setDoc(doc(db, 'mantenimiento', String(o.id)), { title: o.title, desc: o.desc || '', loc: o.loc || '', prio: o.prio, reporter: o.reporter, reporterId: o.reporterId, ts: o.ts, status: o.status, ...(o.doneTs ? { doneTs: o.doneTs } : {}) }),
    saveUsuario: u => setDoc(doc(db, 'usuarios', String(u.id)), { name: u.name, email: u.email || '', role: u.role, roleLabel: u.roleLabel || '', area: u.area, ...(u.subarea ? { subarea: u.subarea } : {}), ...(u.canPublish ? { canPublish: true } : {}) }),
    removeUsuario: id => deleteDoc(doc(db, 'usuarios', String(id))),
    signOut: () => signOut(auth)
  };

  // --- Sembrado único de personal (córrelo una vez desde la consola: seedUsuarios()) ---
  window.seedUsuarios = async () => {
    const slug = n => n.toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g, '').replace(/[^a-z]+/g, '.');
    for (const u of (window.DEMO_USERS || [])) {
      const { id, ...rest } = u;
      await setDoc(doc(db, 'usuarios', id), { ...rest, email: `${slug(u.name)}@${window.APP_CONFIG.DOMINIO}` });
    }
    console.log('Usuarios sembrados en Firestore. Edita correos/roles desde la consola de Firebase.');
  };

  // --- Estado de sesión ---
  onAuthStateChanged(auth, async user => {
    if (!user) { // no hay sesión: mostrar login
      document.getElementById('app').classList.remove('active');
      document.getElementById('login').style.display = 'grid';
      return;
    }
    try {
      const data = await loadAll();
      window.hydrate(data);
      const me = data.usuarios.find(u => (u.email || '').toLowerCase() === user.email.toLowerCase());
      if (!me) { showErr('Tu correo no está dado de alta en el personal.'); await signOut(auth); return; }
      window.enterApp(me);
    } catch (e) {
      showErr('No se pudieron cargar los datos. Revisa las reglas de Firestore.');
      console.error(e);
    }
  });
}
</script>

</body>
</html>
